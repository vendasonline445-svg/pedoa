<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "uz3k46tian");
</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedágio Digital</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="description" content="Acesse e controle seus pagamentos de pedágio digital em um só lugar. Rápido, seguro e fácil.">
    <meta name="theme-color" content="#0b2239">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --primary-lime: #cfff00;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            overflow-x: hidden;
        }

        /* BACKGROUND CONFORME SOLICITADO */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            /* Overlay escuro + Imagem fornecida */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('/inicio-bg-B9TsfniF.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 80px;
            z-index: 10;
        }

        .logo-img {
            height: 50px; /* Ajuste conforme o tamanho da sua imagem */
            width: auto;
        }

        .nav-right {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-right a {
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        /* BOTÃO CRIAR CONTA COM BORDA IGUAL AO CONCORRENTE */
        .btn-account {
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 10px 22px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-account:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        /* CONTEÚDO PRINCIPAL */
        .content-container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .text-side {
            max-width: 680px;
        }

        .text-side h1 {
            color: #fff;
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .text-side h1 span {
            color: var(--primary-lime);
        }

        .text-side p {
            color: #ffffff;
            font-size: 18px;
            font-weight: 400;
            opacity: 0.9;
        }

        /* CARD BRANCO */
        .search-card {
            background-color: #f8f9fa;
            width: 440px;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .search-card h2 {
            font-size: 24px;
            color: #212529;
            margin-bottom: 30px;
            line-height: 1.3;
            font-weight: 400;
        }

        .search-card h2 strong {
            font-weight: 800;
        }

        .plate-input {
            width: 100%;
            padding: 18px;
            background-color: #f0f2f5;
            border: 1px solid transparent;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            color: #495057;
            margin-bottom: 20px;
            transition: border 0.3s;
        }

        .plate-input:focus {
            outline: none;
            border: 1px solid var(--primary-lime);
        }

        .checks {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .check-row {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #6c757d;
            line-height: 1.4;
            cursor: pointer;
        }

        .check-row input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .check-row a {
            color: #6c757d;
            text-decoration: underline;
        }

        .btn-main {
            width: 100%;
            padding: 20px;
            background-color: #e9ecef;
            color: #adb5bd;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 16px;
            cursor: not-allowed;
            transition: 0.3s;
        }

        .btn-main.ready {
            background-color: #dee2e6; /* Estilo cinza do print quando ativo */
            color: #495057;
            cursor: pointer;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #000;
            font-weight: 700;
            text-decoration: underline;
            font-size: 14px;
        }

        /* FOOTER COM LOGO ECOVIAS */
        .site-footer {
            position: absolute;
            bottom: 30px;
            left: 80px;
        }

        .logo-eco {
            height: 35px;
            opacity: 0.8;
        }

        @media (max-width: 1100px) {
            .content-container { flex-direction: column; text-align: center; padding: 100px 20px; }
            .text-side h1 { font-size: 45px; }
            .search-card { width: 100%; margin-top: 40px; }
            header { padding: 20px; }
            .site-footer { position: static; padding: 40px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="hero-section">
    <header>
        <div class="logo">
            <img src="/logo (1).png" alt="Pedágio Digital" class="logo-img">
        </div>
        <nav class="nav-right">
            <a href="#">Fazer Login</a>
            <a href="#">Perguntas frequentes</a>
            <a href="#" class="btn-account">Criar Conta</a>
        </nav>
    </header>

    <div class="content-container">
        <div class="text-side">
            <h1>Desfrute de toda<br>a comodidade do<br>pedágio <span>digital</span></h1>
            <p>Uma nova era para o pedágio começou: ágil e digital como tem que ser.</p>
        </div>

        <div class="form-side">
            <div class="search-card">
                <h2>Um <strong>único</strong> lugar para <strong>acessar</strong> e <strong>controlar</strong> seus pagamentos.</h2>
                
                <form id="tollForm">
                    <input type="text" id="placa" class="plate-input" placeholder="DIGITE SUA PLACA" maxlength="7">
                    
                    <div class="checks">
                        <label class="check-row">
                            <input type="checkbox" class="terms-chk">
                            <span>Aceito os <a href="#">Termos e Condições de Uso</a>.</span>
                        </label>
                        <label class="check-row">
                            <input type="checkbox" class="terms-chk">
                            <span>Estou ciente da <a href="#">Política de Privacidade</a> e me responsabilizo pela veracidade dos dados.</span>
                        </label>
                    </div>

                    <button type="submit" id="btnSubmit" class="btn-main" disabled>Buscar débitos</button>
                </form>

                <a href="#" class="footer-link">Começar agora</a>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <img src="/logo-eco.png" alt="Eco Rodovias" class="logo-eco">
    </footer>
</div>

<script>
    const inputPlaca = document.getElementById('placa');
    const chks = document.querySelectorAll('.terms-chk');
    const btn = document.getElementById('btnSubmit');
    const form = document.getElementById('tollForm');

    function validate() {
        const isPlacaValid = inputPlaca.value.length >= 7;
        const areChksValid = Array.from(chks).every(c => c.checked);

        if (isPlacaValid && areChksValid) {
            btn.disabled = false;
            btn.classList.add('ready');
        } else {
            btn.disabled = true;
            btn.classList.remove('ready');
        }
    }

    inputPlaca.addEventListener('input', (e) => {
        // Formata para uppercase e remove caracteres especiais
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        validate();
    });

    chks.forEach(c => c.addEventListener('change', validate));

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        // Redireciona para a página de débitos com a placa na URL
        window.location.href = `debitos.html?placa=${inputPlaca.value}`;
    });
</script>

</body>
</html>
