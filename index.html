<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script type="text/javascript"> (function(c,l,a,r,i,t,y){ c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)}; t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i; y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y); })(window, document, "clarity", "script", "uz3k46tian"); </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedágio Digital</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="description" content="Acesse e controle seus pagamentos de pedágio digital em um só lugar. Rápido, seguro e fácil.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --primary-lime: #cfff00;
            --footer-black: #000000;
            --footer-gray: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero-section {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                        url('/inicio-bg-B9TsfniF.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 6%;
            z-index: 10;
        }

        .logo-header {
            height: 52px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-criar-conta {
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* CONTEÚDO PRINCIPAL */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 6%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .headline-side {
            max-width: 750px;
        }

        .headline-side h1 {
            font-size: 78px;
            font-weight: 900; /* Peso máximo para a Inter */
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: -4px; /* Mais apertado conforme o original */
            margin-bottom: 20px;
        }

        .headline-side h1 span {
            color: var(--primary-lime);
        }

        .headline-side p {
            font-size: 18px;
            font-weight: 400;
            color: #ffffff;
            opacity: 0.9;
        }

        /* CARD BRANCO */
        .search-card {
            background-color: #f8f9fa;
            width: 440px;
            padding: 50px;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            color: #000;
        }

        .search-card h2 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 35px;
            line-height: 1.2;
        }

        .search-card h2 b {
            font-weight: 800;
        }

        .input-box {
            width: 100%;
            padding: 20px;
            background-color: #f1f3f5;
            border: none;
            border-radius: 14px;
            text-align: center;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 25px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .checkbox-item {
            display: flex;
            gap: 12px;
            font-size: 12.5px;
            color: #444;
            line-height: 1.5;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .btn-action {
            width: 100%;
            padding: 20px;
            background-color: #e9ecef;
            color: #adb5bd;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action.ready {
            background-color: #dee2e6;
            color: #495057;
            cursor: pointer;
        }

        .link-footer-card {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #000;
            font-weight: 800;
            text-decoration: underline;
        }

        /* FOOTER ROBUSTO */
        .footer-full {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .atendimento-row {
            background-color: var(--footer-black);
            padding: 22px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .atendimento-row span {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .partners-row {
            background-color: var(--footer-gray);
            padding: 45px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            height: 45px;
        }

        .partner-group {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo-partner {
            height: 28px;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }

        /* Ajuste específico para a motiva que estava ruim */
        .motiva-logo {
            height: 32px;
            filter: none; /* Mantendo original se o SVG for colorido */
        }

        @media (max-width: 1100px) {
            .main-wrapper { flex-direction: column; text-align: center; padding: 60px 20px; }
            .headline-side h1 { font-size: 50px; letter-spacing: -2px; }
            .search-card { width: 100%; margin-top: 40px; }
            .partners-row { flex-direction: column; gap: 40px; }
        }
    </style>
</head>
<body>

<section class="hero-section">
    <header>
        <img src="/logo (1).png" alt="Pedágio Digital" class="logo-header">
        <nav class="nav-links">
            <a href="#">Fazer Login</a>
            <a href="#">Perguntas frequentes</a>
            <a href="#" class="btn-criar-conta">Criar Conta</a>
        </nav>
    </header>

    <div class="main-wrapper">
        <div class="headline-side">
            <h1>Desfrute de toda<br>a comodidade do<br>pedágio <span>digital</span></h1>
            <p>Uma nova era para o pedágio começou: ágil e digital como tem que ser.</p>
        </div>

        <div class="search-card">
            <h2>Um <b>único</b> lugar para <b>acessar</b> e <b>controlar</b> seus pagamentos.</h2>
            
            <form id="tollForm">
                <input type="text" id="placa" class="input-box" placeholder="DIGITE SUA PLACA" maxlength="7">
                
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" class="chk">
                        <span>Aceito os <a href="#" style="color: inherit;">Termos e Condições de Uso</a>.</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="chk">
                        <span>Estou ciente da <a href="#" style="color: inherit;">Política de Privacidade</a> e me responsabilizo pela veracidade dos dados.</span>
                    </label>
                </div>

                <button type="submit" id="btnSubmit" class="btn-action" disabled>Buscar débitos</button>
            </form>

            <a href="#" class="link-footer-card">Começar agora</a>
        </div>
    </div>
</section>

<footer class="footer-full">
    <div class="atendimento-row">
        <span>Central de atendimento</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    
    <div class="partners-row">
        <img src="/logo (1).png" alt="Logo Footer" class="footer-logo">
        
        <div class="partner-group">
            <img src="/logo-motiva.svg" alt="Motiva" class="logo-partner motiva-logo">
            <img src="/logo-eco.png" alt="Ecorodovias" class="logo-partner">
        </div>
    </div>
</footer>

<script>
    const input = document.getElementById('placa');
    const chks = document.querySelectorAll('.chk');
    const btn = document.getElementById('btnSubmit');

    function validate() {
        const okPlaca = input.value.length >= 7;
        const okChks = Array.from(chks).every(c => c.checked);

        if (okPlaca && okChks) {
            btn.disabled = false;
            btn.classList.add('ready');
        } else {
            btn.disabled = true;
            btn.classList.remove('ready');
        }
    }

    input.addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        validate();
    });

    chks.forEach(c => c.addEventListener('change', validate));

    document.getElementById('tollForm').addEventListener('submit', (e) => {
        e.preventDefault();
        window.location.href = `debitos.html?placa=${input.value}`;
    });
</script>

</body>
</html>
