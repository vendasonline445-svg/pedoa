<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "uz3k46tian");
</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedágio Digital</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="description" content="Acesse e controle seus pagamentos de pedágio digital em um só lugar. Rápido, seguro e fácil.">
    <meta name="theme-color" content="#0b2239">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --primary-lime: #cfff00;
            --dark-bg: #111111;
            --footer-gray: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* SEÇÃO HERO */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                        url('/inicio-bg-B9TsfniF.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 6%;
            z-index: 10;
        }

        .logo-main {
            height: 48px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-outline-white {
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* CONTEÚDO */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 6%;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }

        .hero-headline {
            max-width: 600px;
        }

        .hero-headline h1 {
            font-size: 70px;
            font-weight: 900;
            line-height: 1.05;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: -2px;
        }

        .hero-headline h1 span {
            color: var(--primary-lime);
        }

        .hero-headline p {
            font-size: 17px;
            font-weight: 400;
            color: #f0f0f0;
            line-height: 1.4;
        }

        /* CARD DE BUSCA */
        .search-card {
            background-color: #f8f9fa;
            width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: #000;
        }

        .search-card h2 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .search-card h2 b {
            font-weight: 800;
        }

        .plate-input {
            width: 100%;
            padding: 18px;
            background-color: #f1f3f5;
            border: 2px solid transparent;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .terms-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .term-item {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: #555;
            line-height: 1.4;
        }

        .term-item input {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background-color: #e9ecef;
            color: #adb5bd;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit.active {
            background-color: #dee2e6;
            color: #495057;
            cursor: pointer;
        }

        .card-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #000;
            font-weight: 700;
            text-decoration: underline;
            font-size: 14px;
        }

        /* NOVO FOOTER EXPANDIDO */
        .footer-expanded {
            background-color: var(--dark-bg);
            width: 100%;
        }

        .atendimento-bar {
            background-color: #000;
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .atendimento-bar span {
            font-size: 14px;
            font-weight: 600;
        }

        .footer-logos-area {
            background-color: #1a1a1a;
            padding: 40px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo-main {
            height: 40px;
        }

        .partner-logos {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-partner {
            height: 25px;
            filter: brightness(0) invert(1);
            opacity: 0.7;
        }

        @media (max-width: 1100px) {
            .main-container { flex-direction: column; text-align: center; padding: 60px 20px; }
            .hero-headline h1 { font-size: 48px; }
            .search-card { width: 100%; margin-top: 40px; }
            .footer-logos-area { flex-direction: column; gap: 30px; }
        }
    </style>
</head>
<body>

<section class="hero-section">
    <header>
        <img src="/logo (1).png" alt="Pedágio Digital" class="logo-main">
        <nav class="nav-links">
            <a href="#">Fazer Login</a>
            <a href="#">Perguntas frequentes</a>
            <a href="#" class="btn-outline-white">Criar Conta</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="hero-headline">
            <h1>Desfrute de toda<br>a comodidade do<br>pedágio <span>digital</span></h1>
            <p>Uma nova era para o pedágio começou: ágil e digital como tem que ser.</p>
        </div>

        <div class="search-card">
            <h2>Um <b>único</b> lugar para <b>acessar</b> e <b>controlar</b> seus pagamentos.</h2>
            
            <form id="mainForm">
                <input type="text" id="placa" class="plate-input" placeholder="DIGITE SUA PLACA" maxlength="7">
                
                <div class="terms-section">
                    <label class="term-item">
                        <input type="checkbox" class="chk">
                        <span>Aceito os <a href="#" style="color: inherit;">Termos e Condições de Uso</a>.</span>
                    </label>
                    <label class="term-item">
                        <input type="checkbox" class="chk">
                        <span>Estou ciente da <a href="#" style="color: inherit;">Política de Privacidade</a> e me responsabilizo pela veracidade dos dados.</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit" disabled>Buscar débitos</button>
            </form>

            <a href="#" class="card-link">Começar agora</a>
        </div>
    </div>
</section>

<footer class="footer-expanded">
    <div class="atendimento-bar">
        <span>Central de atendimento</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    
    <div class="footer-logos-area">
        <img src="/logo (1).png" alt="Logo Footer" class="footer-logo-main">
        
        <div class="partner-logos">
            <img src="https://i.imgur.com/v8p0qG0.png" alt="Motiva" class="logo-partner"> <img src="/logo-eco.png" alt="Ecorodovias" class="logo-partner">
        </div>
    </div>
</footer>

<script>
    const placaInput = document.getElementById('placa');
    const checkboxes = document.querySelectorAll('.chk');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('mainForm');

    function checkValidation() {
        const isPlacaValid = placaInput.value.length >= 7;
        const allChecked = Array.from(checkboxes).every(c => c.checked);

        if (isPlacaValid && allChecked) {
            submitBtn.disabled = false;
            submitBtn.classList.add('active');
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.remove('active');
        }
    }

    placaInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        checkValidation();
    });

    checkboxes.forEach(c => c.addEventListener('change', checkValidation));

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        window.location.href = `debitos.html?placa=${placaInput.value}`;
    });
</script>

</body>
</html>
