<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedágio Digital</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --primary-lime: #cfff00;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
        }

        .hero-section {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('/inicio-bg-B9TsfniF.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 6%;
        }

        .logo-header { height: 45px; }

        .btn-criar-conta {
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 8px 18px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        /* CONTAINER PRINCIPAL - FLEX PARA DESKTOP */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 6%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .headline-side h1 {
            font-size: 72px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -3px;
            color: #fff;
        }

        .headline-side h1 span { color: var(--primary-lime); }

        .headline-side p {
            font-size: 18px;
            color: #fff;
            margin-top: 20px;
            opacity: 0.9;
        }

        /* CARD DE BUSCA */
        .search-card {
            background-color: #f8f9fa;
            width: 440px;
            padding: 40px;
            border-radius: 28px;
            color: #000;
        }

        .search-card h2 { font-size: 22px; font-weight: 500; margin-bottom: 25px; }
        .input-box {
            width: 100%;
            padding: 18px;
            background-color: #f1f3f5;
            border: none;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* FOOTER */
        .footer-full { background-color: #1a1a1a; padding: 40px 6%; }
        .partners-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .partner-group { display: flex; gap: 30px; }
        .logo-partner { height: 25px; filter: brightness(0) invert(1); }

        /* =============================================
           AJUSTES MOBILE (IGUAL AO ANEXO)
        ============================================= */
        @media (max-width: 991px) {
            header { padding: 20px 5%; }
            .nav-links a:not(.btn-criar-conta) { display: none; } /* Esconde links extras no mobile */

            .main-wrapper {
                flex-direction: column; /* Empilha elementos */
                text-align: center;
                padding: 40px 20px 80px 20px;
            }

            .headline-side {
                margin-bottom: 40px;
            }

            .headline-side h1 {
                font-size: 42px; /* Reduz para caber na tela mobile */
                letter-spacing: -1px;
            }

            .headline-side p {
                font-size: 16px;
                padding: 0 10px;
            }

            .search-card {
                width: 100%; /* Card ocupa a largura total no mobile */
                padding: 30px 20px;
                border-radius: 24px;
            }

            .partners-row {
                flex-direction: column;
                gap: 30px;
            }
        }
    </style>
</head>
<body>

<section class="hero-section">
    <header>
        <img src="/logo (1).png" alt="Logo" class="logo-header">
        <div class="nav-links">
            <a href="#" class="btn-criar-conta">Criar Conta</a>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="headline-side">
            <h1>DESFRUTE DE TODA<br>A COMODIDADE DO<br>PEDÁGIO <span>DIGITAL</span></h1>
            <p>Uma nova era para o pedágio começou: ágil e digital como tem que ser.</p>
        </div>

        <div class="search-card">
            <h2>Um <b>único</b> lugar para <b>acessar</b> e <b>controlar</b> seus pagamentos.</h2>
            <input type="text" class="input-box" placeholder="DIGITE SUA PLACA" maxlength="7">
            
            <div style="text-align: left; font-size: 12px; margin-bottom: 20px; color: #666;">
                <label><input type="checkbox"> Aceito os Termos e Condições.</label><br>
                <label><input type="checkbox"> Estou ciente da Política de Privacidade.</label>
            </div>

            <button class="btn btn-secondary w-100 p-3" style="border-radius: 12px; font-weight: 700;">BUSCAR DÉBITOS</button>
            <a href="#" style="display: block; margin-top: 20px; color: #000; font-weight: 700; text-decoration: underline;">Começar agora</a>
        </div>
    </div>
</section>

<footer class="footer-full">
    <div class="partners-row">
        <img src="/logo (1).png" alt="Logo" style="height: 35px;">
        <div class="partner-group">
            <img src="/logo-motiva.svg" alt="Motiva" class="logo-partner" style="filter: none;">
            <img src="/logo-eco.png" alt="Eco" class="logo-partner">
        </div>
    </div>
</footer>

</body>
</html>
